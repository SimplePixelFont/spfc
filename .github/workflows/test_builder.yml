name: CI Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Test a representative cross-section of targets on every push/PR.
# Full platform matrix runs only on real releases (builder.yml).
# Using 3 targets: native Linux, cross macOS, cross Windows.

jobs:
  test-build:
    name: Test (${{ matrix.component }} / ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [spfc, spfc-target-ttf]
        target:
          - x86_64-unknown-linux-gnu   # native — fast, good baseline
          - x86_64-apple-darwin        # cross macOS — validates SDK version fix
          - x86_64-pc-windows-gnu      # cross Windows — validates dll naming
    env:
      COMPONENT: ${{ matrix.component }}
      TAG_NAME:  ci-test
      TARGET:    ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig + cargo-zigbuild
        run: |
          pip install ziglang --quiet
          cargo install cargo-zigbuild --locked

      - name: Set macOS deployment target
        if: contains(matrix.target, 'apple')
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV

      - name: Build
        run: bash .ci/build.sh

      - name: Verify artifact exists
        run: |
          EXPECTED="artifacts/${COMPONENT}.${TAG_NAME}.${TARGET}.tar.gz"
          echo "Checking for: $EXPECTED"
          test -f "$EXPECTED" && echo "✅ Found" || (echo "❌ Missing" && exit 1)
          echo "── Contents ──"
          tar -tzvf "$EXPECTED"