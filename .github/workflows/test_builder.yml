name: CI Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tests a representative cross-section on every push/PR.
# Full 10-target matrix only runs on real releases via builder.yml.
#
# Matrix must be fully explicit (include-only) so GitHub Actions creates
# exactly the intended jobs. Mixing list keys with include entries does NOT
# cross-multiply — the includes become standalone jobs missing the list key.

jobs:
  test-build:
    name: Test (${{ matrix.component }} / ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # spfc (CLI executable)
          - { component: spfc,            target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { component: spfc,            target: x86_64-apple-darwin,      os: macos-latest  }
          - { component: spfc,            target: x86_64-pc-windows-gnu,    os: ubuntu-latest }
          # spfc-target-ttf (cdylib plugin)
          - { component: spfc-target-ttf, target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { component: spfc-target-ttf, target: x86_64-apple-darwin,      os: macos-latest  }
          - { component: spfc-target-ttf, target: x86_64-pc-windows-gnu,    os: ubuntu-latest }
    runs-on: ${{ matrix.os }}
    env:
      COMPONENT: ${{ matrix.component }}
      TAG_NAME:  ci-test
      TARGET:    ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig + cargo-zigbuild
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install ziglang --quiet
          cargo install cargo-zigbuild --locked

      - name: Build
        run: bash .ci/build.sh

      - name: Verify artifact exists
        run: |
          EXPECTED="artifacts/${COMPONENT}.${TAG_NAME}.${TARGET}.tar.gz"
          echo "Checking for: $EXPECTED"
          test -f "$EXPECTED" && echo "✅ Found" || (echo "❌ Missing" && exit 1)
          echo "── Contents ──"
          tar -tzvf "$EXPECTED"