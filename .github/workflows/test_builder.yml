name: CI Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Representative cross-section: one Linux cross, one macOS native, one Windows cross.
# Full 10-target matrix runs only on real releases via builder.yml.

jobs:
  test-build:
    name: Test (${{ matrix.component }} / ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        component: [spfc, spfc-target-ttf]
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-apple-darwin,      os: macos-latest  }
          - { target: x86_64-pc-windows-gnu,    os: ubuntu-latest }
    runs-on: ${{ matrix.os }}
    env:
      COMPONENT: ${{ matrix.component }}
      TAG_NAME:  ci-test
      TARGET:    ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig + cargo-zigbuild
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install ziglang --quiet
          cargo install cargo-zigbuild --locked

      - name: Build
        run: bash .ci/build.sh

      - name: Verify artifact exists
        run: |
          EXPECTED="artifacts/${COMPONENT}.${TAG_NAME}.${TARGET}.tar.gz"
          echo "Checking for: $EXPECTED"
          test -f "$EXPECTED" && echo "✅ Found" || (echo "❌ Missing" && exit 1)
          echo "── Contents ──"
          tar -tzvf "$EXPECTED"